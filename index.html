<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原生Canvas滚动球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .canvas-wrapper {
            position: relative;
            margin-bottom: 30px;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 500px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }
        
        .instructions {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .instructions h3 {
            color: #ffd700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .instructions ul {
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 8px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .control-group {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .control-group h4 {
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button.reset {
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
        }
        
        button.color {
            background: linear-gradient(45deg, #42e695, #3bb2b8);
        }
        
        button.gravity {
            background: linear-gradient(45deg, #a8edea, #fed6e3);
            color: #333;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .physics-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .slider-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .slider-container label {
            display: block;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4facfe;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .value-display {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #4facfe;
        }
        
        .debug {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-top: 20px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .debug-title {
            color: #ff6b6b;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .mobile-warning {
            display: none;
            background: rgba(255, 215, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ffd700;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            #gameCanvas {
                height: 400px;
            }
            
            .mobile-warning {
                display: block;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            button {
                min-width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            #gameCanvas {
                height: 300px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
        
        .color-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .color-option:hover {
            transform: scale(1.2);
        }
        
        .color-option.active {
            border-color: white;
            transform: scale(1.1);
        }
        
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="mobile-warning">
        📱 移动设备优化：支持触摸操作，建议横屏体验更佳
    </div>
    
    <div class="container">
        <header>
            <h1>🎱 Canvas物理球体模拟</h1>
            <div class="subtitle">原生Canvas实现 · 无外部依赖 · 高性能物理引擎</div>
        </header>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div class="instructions">
            <h3>🎮 操作指南</h3>
            <ul>
                <li><strong>桌面设备：</strong>点击球体并拖动来控制滚动方向和力量</li>
                <li><strong>移动设备：</strong>直接用手指在球体上滑动</li>
                <li><strong>物理特性：</strong>重力、摩擦力、弹性碰撞、空气阻力</li>
                <li><strong>拖拽指示器：</strong>红色线条显示拖动力量和方向</li>
            </ul>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <h4>🎯 基本控制</h4>
                <div class="buttons">
                    <button class="reset" onclick="resetBall()">🔄 重置球体</button>
                    <button class="gravity" onclick="toggleGravity()">🌍 切换重力</button>
                    <button onclick="clearTrails()">✨ 清除轨迹</button>
                </div>
            </div>
            
            <div class="control-group">
                <h4>🎨 颜色选择</h4>
                <div class="color-options">
                    <div class="color-option active" style="background: #ff6b6b;" data-color="#ff6b6b" onclick="changeColor('#ff6b6b')"></div>
                    <div class="color-option" style="background: #4facfe;" data-color="#4facfe" onclick="changeColor('#4facfe')"></div>
                    <div class="color-option" style="background: #42e695;" data-color="#42e695" onclick="changeColor('#42e695')"></div>
                    <div class="color-option" style="background: #ffd700;" data-color="#ffd700" onclick="changeColor('#ffd700')"></div>
                    <div class="color-option" style="background: #9d4edd;" data-color="#9d4edd" onclick="changeColor('#9d4edd')"></div>
                    <div class="color-option" style="background: #ff9e00;" data-color="#ff9e00" onclick="changeColor('#ff9e00')"></div>
                </div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="speedValue">0.0</div>
                <div class="stat-label">当前速度 (px/frame)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="posXValue">0</div>
                <div class="stat-label">X坐标</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="posYValue">0</div>
                <div class="stat-label">Y坐标</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="interactionCount">0</div>
                <div class="stat-label">交互次数</div>
            </div>
        </div>
        
        <div class="physics-controls">
            <div class="slider-container">
                <label for="gravitySlider">🌍 重力强度: <span id="gravityValue">0.2</span></label>
                <input type="range" id="gravitySlider" min="0" max="1" step="0.01" value="0.2">
                <div class="value-display" id="gravityDisplay">0.2</div>
            </div>
            
            <div class="slider-container">
                <label for="frictionSlider">🔄 摩擦力: <span id="frictionValue">0.98</span></label>
                <input type="range" id="frictionSlider" min="0.9" max="1" step="0.001" value="0.98">
                <div class="value-display" id="frictionDisplay">0.98</div>
            </div>
            
            <div class="slider-container">
                <label for="bounceSlider">⚡ 弹性系数: <span id="bounceValue">0.9</span></label>
                <input type="range" id="bounceSlider" min="0.1" max="1" step="0.05" value="0.9">
                <div class="value-display" id="bounceDisplay">0.9</div>
            </div>
        </div>
        
        <div class="debug">
            <div class="debug-title">🔧 调试信息</div>
            <div id="debugOutput">初始化中...</div>
        </div>
    </div>

    <script>
        // 获取Canvas和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置Canvas尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 500;
            if (window.innerWidth <= 768) {
                canvas.height = 400;
            }
            if (window.innerWidth <= 480) {
                canvas.height = 300;
            }
        }
        
        // 球体对象
        const ball = {
            x: 0,
            y: 0,
            radius: 40,
            vx: 0,
            vy: 0,
            color: '#ff6b6b',
            trail: [],
            maxTrailLength: 30
        };
        
        // 物理参数
        let physics = {
            gravity: 0.2,
            friction: 0.98,
            bounce: 0.9,
            airResistance: 0.995,
            gravityEnabled: true
        };
        
        // 交互状态
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let interactionCount = 0;
        let showTrail = true;
        let particles = [];
        
        // 初始化
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 设置初始位置
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            // 设置滑块事件
            setupSliders();
            
            // 设置Canvas事件
            setupCanvasEvents();
            
            // 开始动画循环
            requestAnimationFrame(animate);
            
            updateDebug('Canvas物理引擎初始化完成');
        }
        
        // 设置滑块
        function setupSliders() {
            const sliders = ['gravitySlider', 'frictionSlider', 'bounceSlider'];
            sliders.forEach(sliderId => {
                const slider = document.getElementById(sliderId);
                const valueSpan = document.getElementById(sliderId.replace('Slider', 'Value'));
                const display = document.getElementById(sliderId.replace('Slider', 'Display'));
                
                slider.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    valueSpan.textContent = value.toFixed(3);
                    display.textContent = value.toFixed(3);
                    
                    // 更新物理参数
                    if (sliderId === 'gravitySlider') physics.gravity = value;
                    if (sliderId === 'frictionSlider') physics.friction = value;
                    if (sliderId === 'bounceSlider') physics.bounce = value;
                    
                    updateDebug(`${sliderId} 更新为: ${value}`);
                });
            });
        }
        
        // 设置Canvas事件
        function setupCanvasEvents() {
            // 鼠标事件
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mouseleave', handleMouseUp);
            
            // 触摸事件
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            
            // 防止默认行为
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        // 事件处理函数
        function handleMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (isBallClicked(x, y)) {
                isDragging = true;
                dragStart.x = x;
                dragStart.y = y;
                interactionCount++;
                updateDebug('开始拖动球体');
                e.preventDefault();
            }
        }
        
        function handleMouseMove(e) {
            if (!isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 更新球体位置
            ball.x = x;
            ball.y = y;
            ball.vx = x - dragStart.x;
            ball.vy = y - dragStart.y;
            
            e.preventDefault();
        }
        
        function handleMouseUp(e) {
            if (isDragging) {
                // 计算释放力量
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const forceX = (dragStart.x - x) * 0.15;
                const forceY = (dragStart.y - y) * 0.15;
                
                ball.vx = forceX;
                ball.vy = forceY;
                
                // 创建粒子效果
                createParticles(ball.x, ball.y, forceX, forceY);
                
                isDragging = false;
                updateDebug(`释放球体，力量: ${forceX.toFixed(1)}, ${forceY.toFixed(1)}`);
            }
        }
        
        // 触摸事件处理
        function handleTouchStart(e) {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                
                if (isBallClicked(x, y)) {
                    isDragging = true;
                    dragStart.x = x;
                    dragStart.y = y;
                    interactionCount++;
                    updateDebug('触摸开始拖动');
                    e.preventDefault();
                }
            }
        }
        
        function handleTouchMove(e) {
            if (!isDragging || e.touches.length !== 1) return;
            
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            ball.x = x;
            ball.y = y;
            ball.vx = x - dragStart.x;
            ball.vy = y - dragStart.y;
            
            e.preventDefault();
        }
        
        function handleTouchEnd(e) {
            if (isDragging) {
                const touch = e.changedTouches[0];
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                
                const forceX = (dragStart.x - x) * 0.15;
                const forceY = (dragStart.y - y) * 0.15;
                
                ball.vx = forceX;
                ball.vy = forceY;
                
                createParticles(ball.x, ball.y, forceX, forceY);
                
                isDragging = false;
                updateDebug('触摸释放球体');
            }
        }
        
        // 检查是否点击了球体
        function isBallClicked(x, y) {
            const distance = Math.sqrt((x - ball.x) ** 2 + (y - ball.y) ** 2);
            return distance <= ball.radius;
        }
        
        // 创建粒子效果
        function createParticles(x, y, vx, vy) {
            const speed = Math.sqrt(vx * vx + vy * vy);
            const particleCount = Math.min(Math.floor(speed / 5), 20);
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10 + vx * 0.2,
                    vy: (Math.random() - 0.5) * 10 + vy * 0.2,
                    radius: Math.random() * 4 + 2,
                    color: ball.color,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.03
                });
            }
        }
        
        // 更新粒子
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // 重力
                p.life -= p.decay;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }
        
        // 动画循环
        function animate() {
            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            drawBackground();
            
            // 更新物理
            if (!isDragging) {
                updatePhysics();
            }
            
            // 更新轨迹
            if (showTrail) {
                updateTrail();
            }
            
            // 更新粒子
            updateParticles();
            
            // 绘制轨迹
            if (showTrail) {
                drawTrail();
            }
            
            // 绘制粒子
            drawParticles();
            
            // 绘制球体
            drawBall();
            
            // 绘制拖动指示器
            if (isDragging) {
                drawDragIndicator();
            }
            
            // 更新显示
            updateDisplay();
            
            // 继续动画循环
            requestAnimationFrame(animate);
        }
        
        // 绘制背景
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
            gradient.addColorStop(1, 'rgba(118, 75, 162, 0.3)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            
            // 垂直线
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // 水平线
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        // 更新物理
        function updatePhysics() {
            // 重力
            if (physics.gravityEnabled) {
                ball.vy += physics.gravity;
            }
            
            // 空气阻力
            ball.vx *= physics.airResistance;
            ball.vy *= physics.airResistance;
            
            // 摩擦力
            ball.vx *= physics.friction;
            ball.vy *= physics.friction;
            
            // 更新位置
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // 边界碰撞
            handleCollisions();
        }
        
        // 处理碰撞
        function handleCollisions() {
            // 左右边界
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx = -ball.vx * physics.bounce;
                createParticles(ball.x, ball.y, -ball.vx, ball.vy);
            } else if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.vx = -ball.vx * physics.bounce;
                createParticles(ball.x, ball.y, -ball.vx, ball.vy);
            }
            
            // 上下边界
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = -ball.vy * physics.bounce;
                createParticles(ball.x, ball.y, ball.vx, -ball.vy);
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.vy = -ball.vy * physics.bounce;
                ball.vx *= 0.95; // 地面额外摩擦
                createParticles(ball.x, ball.y, ball.vx, -ball.vy);
            }
        }
        
        // 更新轨迹
        function updateTrail() {
            ball.trail.push({ x: ball.x, y: ball.y });
            if (ball.trail.length > ball.maxTrailLength) {
                ball.trail.shift();
            }
        }
        
        // 绘制轨迹
        function drawTrail() {
            for (let i = 0; i < ball.trail.length; i++) {
                const point = ball.trail[i];
                const alpha = i / ball.trail.length * 0.5;
                const radius = ball.radius * (i / ball.trail.length * 0.7);
                
                ctx.globalAlpha = alpha;
                ctx.fillStyle = ball.color;
                ctx.beginPath();
                ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }
        
        // 绘制球体
        function drawBall() {
            // 阴影
            ctx.shadowColor = ball.color;
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // 球体
            const gradient = ctx.createRadialGradient(
                ball.x - ball.radius * 0.3,
                ball.y - ball.radius * 0.3,
                0,
                ball.x,
                ball.y,
                ball.radius
            );
            
            gradient.addColorStop(0, lightenColor(ball.color, 40));
            gradient.addColorStop(1, ball.color);
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(
                ball.x - ball.radius * 0.2,
                ball.y - ball.radius * 0.2,
                ball.radius * 0.3,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 重置阴影
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
        }
        
        // 绘制拖动指示器
        function drawDragIndicator() {
            // 连线
            ctx.strokeStyle = 'rgba(255, 100, 100, 0.8)';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(dragStart.x, dragStart.y);
            ctx.lineTo(ball.x, ball.y);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 力量指示
            const force = Math.sqrt(
                (ball.x - dragStart.x) ** 2 + (ball.y - dragStart.y) ** 2
            );
            const angle = Math.atan2(ball.y - dragStart.y, ball.x - dragStart.x);
            
            ctx.save();
            ctx.translate(dragStart.x, dragStart.y);
            ctx.rotate(angle);
            
            // 力量条
            ctx.strokeStyle = 'rgba(255, 50, 50, 0.6)';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.min(force, 200), 0);
            ctx.stroke();
            
            // 力量点
            ctx.fillStyle = '#ff3232';
            ctx.beginPath();
            ctx.arc(Math.min(force, 200), 0, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 更新显示
        function updateDisplay() {
            // 计算速度
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            
            // 更新统计
            document.getElementById('speedValue').textContent = speed.toFixed(1);
            document.getElementById('posXValue').textContent = Math.round(ball.x);
            document.getElementById('posYValue').textContent = Math.round(ball.y);
            document.getElementById('interactionCount').textContent = interactionCount;
        }
        
        // 工具函数：颜色变亮
        function lightenColor(color, percent) {
            const num = parseInt(color.slice(1), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            
            return `#${(
                0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1)}`;
        }
        
        // 控制函数
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.vx = 0;
            ball.vy = 0;
            ball.trail = [];
            interactionCount++;
            updateDebug('重置球体位置');
        }
        
        function changeColor(color) {
            ball.color = color;
            interactionCount++;
            
            // 更新颜色选项状态
            document.querySelectorAll('.color-option').forEach(option => {
                option.classList.remove('active');
                if (option.dataset.color === color) {
                    option.classList.add('active');
                }
            });
            
            updateDebug(`切换颜色: ${color}`);
        }
        
        function toggleGravity() {
            physics.gravityEnabled = !physics.gravityEnabled;
            interactionCount++;
            updateDebug(physics.gravityEnabled ? '重力已开启' : '重力已关闭');
        }
        
        function clearTrails() {
            ball.trail = [];
            particles = [];
            interactionCount++;
            updateDebug('清除轨迹和粒子');
        }
        
        function updateDebug(message) {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('debugOutput').textContent = 
                `[${time}] ${message} | 位置: (${Math.round(ball.x)}, ${Math.round(ball.y)}) | 速度: (${ball.vx.toFixed(1)}, ${ball.vy.toFixed(1)})`;
        }
        
        // 初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
