<!DOCTYPE html>
<html>
<head>
    <title>简化乒乓球游戏</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #0f0; background: #111; }
        .controls { position: absolute; top: 20px; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <div class="controls">
        <div>玩家1: W/S | 玩家2: ↑/↓ | 空格: 开始/暂停</div>
        <div id="score">0 - 0</div>
        <div id="status">按空格开始</div>
    </div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <script>
        console.log('🎮 简化乒乓球游戏启动...');
        
        // 基础配置
        const config = {
            paddleWidth: 15,
            paddleHeight: 100,
            ballSize: 15,
            ballSpeed: 5
        };
        
        // 游戏状态
        const state = {
            running: false,
            paused: false,
            score1: 0,
            score2: 0,
            paddle1Y: 200,
            paddle2Y: 200,
            ballX: 400,
            ballY: 250,
            ballSpeedX: 5,
            ballSpeedY: 3,
            keys: {}
        };
        
        // 获取元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const statusDisplay = document.getElementById('status');
        
        // 事件监听
        window.addEventListener('keydown', e => {
            state.keys[e.key] = true;
            if (e.key === ' ') {
                if (!state.running) {
                    startGame();
                } else {
                    state.paused = !state.paused;
                    statusDisplay.textContent = state.paused ? '已暂停' : '游戏中';
                }
            }
        });
        
        window.addEventListener('keyup', e => {
            state.keys[e.key] = false;
        });
        
        // 游戏函数
        function startGame() {
            state.running = true;
            state.paused = false;
            state.score1 = 0;
            state.score2 = 0;
            resetBall();
            statusDisplay.textContent = '游戏中';
            updateScore();
            console.log('游戏开始');
        }
        
        function resetBall() {
            state.ballX = 400;
            state.ballY = 250;
            state.ballSpeedX = Math.random() > 0.5 ? 5 : -5;
            state.ballSpeedY = (Math.random() - 0.5) * 6;
        }
        
        function update() {
            if (!state.running || state.paused) return;
            
            // 更新球拍
            if (state.keys['w']) state.paddle1Y -= 8;
            if (state.keys['s']) state.paddle1Y += 8;
            if (state.keys['ArrowUp']) state.paddle2Y -= 8;
            if (state.keys['ArrowDown']) state.paddle2Y += 8;
            
            // 限制球拍
            state.paddle1Y = Math.max(0, Math.min(400, state.paddle1Y));
            state.paddle2Y = Math.max(0, Math.min(400, state.paddle2Y));
            
            // 更新球
            state.ballX += state.ballSpeedX;
            state.ballY += state.ballSpeedY;
            
            // 上下边界
            if (state.ballY <= 0 || state.ballY >= 500) {
                state.ballSpeedY = -state.ballSpeedY;
            }
            
            // 球拍碰撞
            if (state.ballX <= 15 && 
                state.ballY >= state.paddle1Y && 
                state.ballY <= state.paddle1Y + 100) {
                state.ballSpeedX = Math.abs(state.ballSpeedX);
            }
            
            if (state.ballX >= 785 && 
                state.ballY >= state.paddle2Y && 
                state.ballY <= state.paddle2Y + 100) {
                state.ballSpeedX = -Math.abs(state.ballSpeedX);
            }
            
            // 得分
            if (state.ballX < 0) {
                state.score2++;
                resetBall();
                updateScore();
            }
            
            if (state.ballX > 800) {
                state.score1++;
                resetBall();
                updateScore();
            }
            
            // 胜利条件
            if (state.score1 >= 11 || state.score2 >= 11) {
                const winner = state.score1 >= 11 ? '玩家1' : '玩家2';
                statusDisplay.textContent = `${winner} 获胜！`;
                state.running = false;
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 800, 500);
            
            // 中间线
            ctx.strokeStyle = '#0f0';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(400, 0);
            ctx.lineTo(400, 500);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 球拍
            ctx.fillStyle = '#0f0';
            ctx.fillRect(10, state.paddle1Y, 15, 100);
            ctx.fillRect(775, state.paddle2Y, 15, 100);
            
            // 球
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(state.ballX, state.ballY, 7, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function updateScore() {
            scoreDisplay.textContent = `${state.score1} - ${state.score2}`;
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 启动游戏
        gameLoop();
        console.log('游戏循环启动');
        
        // 测试控制
        console.log('测试控制: 按 W/S 和 ↑/↓ 测试');
    </script>
</body>
</html>
